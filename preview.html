        const params = new URLSearchParams(window.location.search);
        let currentMaterial = params.get('material') || 'ss-nameplate-silver';
        if (!catalog[currentMaterial]) currentMaterial = 'ss-nameplate-silver';

        const pageTitle = document.getElementById('pageTitle');
        const pageSubtitle = document.getElementById('pageSubtitle');
        const gallery = document.getElementById('gallery');
        const materialChips = document.getElementById('materialChips');

        function renderChips() {
            materialChips.innerHTML = Object.entries(catalog).map(([key, item]) => `
                <a href="preview.html?material=${encodeURIComponent(key)}" class="material-chip ${key === currentMaterial ? 'active' : ''} rounded-full px-4 py-2 text-sm font-semibold transition hover:bg-white/15">${item.title}</a>
            `).join('');
        }

        function renderGallery() {
            const item = catalog[currentMaterial];
            pageTitle.textContent = item.title;
            pageSubtitle.textContent = item.subtitle;
            gallery.innerHTML = item.images.map((src, index) => `
                <figure class="gallery-item">
                    <img src="${src}" alt="${item.title} product photo ${index + 1}" loading="lazy">
                </figure>
            `).join('');
        }

        renderChips();
        renderGallery();
    </script>
